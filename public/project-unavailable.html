<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Not Live</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: #16161a;
        --text: #f3f4f6;
        --muted: #a1a1aa;
        --accent: #8b5cf6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 10% 0%, rgba(139, 92, 246, 0.18), transparent 35%),
          var(--bg);
        color: var(--text);
      }

      .card {
        width: min(620px, 100%);
        border: 1px solid rgba(139, 92, 246, 0.35);
        border-radius: 14px;
        background: var(--panel);
        padding: 1.3rem;
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      p {
        margin: 0.8rem 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .project-name {
        margin-top: 0.5rem;
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>This project demo is not live right now.</h1>
      <p>
        The deployed preview has been removed or the link has expired. Please check the source
        code repository for details.
      </p>
      <p class="project-name" id="projectName"></p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const projectName = params.get("project");

      if (projectName) {
        document.getElementById("projectName").textContent = `Project: ${projectName}`;
      }
    </script>
  </body>
</html>
